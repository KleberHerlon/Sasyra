<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Conectando Google Calendar...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0A0F0B;
      color: #E8EDE8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #111B14;
      border: 1px solid #1E2D23;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      max-width: 400px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1E2D23;
      border-top-color: #6EE7B7;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 13px; color: #859B8A; }
    .success h1 { color: #6EE7B7; }
    .success .spinner { display: none; }
  </style>
</head>
<body>
  <div class="card" id="status">
    <div class="spinner"></div>
    <h1>Conectando...</h1>
    <p>Aguardando autorização do Google Calendar.</p>
  </div>
  <script>
    (function() {
      const hash = window.location.hash;
      if (hash && hash.includes('access_token')) {
        const params = new URLSearchParams(hash.replace('#', '?'));
        const token = {
          access_token: params.get('access_token'),
          expires_at: Date.now() + (parseInt(params.get('expires_in') || '3600') * 1000),
          token_type: params.get('token_type'),
        };
        localStorage.setItem('sasyra_google_token', JSON.stringify(token));
        document.getElementById('status').className = 'card success';
        document.querySelector('h1').textContent = 'Conectado!';
        document.querySelector('p').textContent = 'Você já pode fechar esta janela.';
        if (window.opener) {
          window.opener.postMessage('sasyra_google_connected', '*');
        }
        setTimeout(function() {
          window.close();
        }, 1500);
      } else {
        document.querySelector('h1').textContent = 'Falha na conexão';
        document.querySelector('p').textContent = 'Nenhum token recebido. Tente novamente.';
      }
    })();
  </script>
</body>
</html>

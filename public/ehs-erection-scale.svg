<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 320" width="120" height="320">
  <!-- E0 - Sem ereção -->
  <g id="ehs-0">
    <rect x="0" y="2" width="120" height="74" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <!-- Corpo - vista lateral -->
    <path d="M48,8 Q36,8 32,18 L28,40 Q28,56 26,62 Q24,68 26,72 Q28,78 32,78 L48,78 Q52,78 56,76" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.4"/>
    <!-- Pênis pendente para baixo -->
    <line x1="30" y1="38" x2="30" y2="64" stroke="#8899AA" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
    <ellipse cx="30" cy="66" rx="5.5" ry="4" fill="none" stroke="#8899AA" stroke-width="2.5" opacity="0.45"/>
    <!-- Label -->
    <text x="60" y="30" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8899AA" opacity="0.5">E0</text>
  </g>

  <!-- Separador -->
  <line x1="10" y1="78" x2="110" y2="78" stroke="#1F2E45" stroke-width="0.5" opacity="0.35"/>

  <!-- E1 - Aumentado -->
  <g id="ehs-1">
    <rect x="0" y="80" width="120" height="74" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <path d="M48,86 Q36,86 32,96 L28,118 Q28,134 26,140 Q24,146 26,150 Q28,156 32,156 L48,156 Q52,156 56,154" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.4"/>
    <!-- Pênis ~30° -->
    <line x1="30" y1="116" x2="18" y2="142" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <ellipse cx="16" cy="144" rx="6" ry="4.5" fill="none" stroke="#FBBF24" stroke-width="3" opacity="0.6"/>
    <text x="60" y="108" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FBBF24" opacity="0.5">E1</text>
  </g>

  <line x1="10" y1="156" x2="110" y2="156" stroke="#1F2E45" stroke-width="0.5" opacity="0.35"/>

  <!-- E2 - Rígido parcial -->
  <g id="ehs-2">
    <rect x="0" y="158" width="120" height="74" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <path d="M48,164 Q36,164 32,174 L28,196 Q28,212 26,218 Q24,224 26,228 Q28,234 32,234 L48,234 Q52,234 56,232" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.4"/>
    <!-- Pênis ~60° -->
    <line x1="30" y1="194" x2="10" y2="214" stroke="#FBBF24" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>
    <ellipse cx="7" cy="216" rx="7" ry="5" fill="none" stroke="#FBBF24" stroke-width="3" opacity="0.7" transform="rotate(-30,7,216)"/>
    <text x="60" y="186" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FBBF24" opacity="0.5">E2</text>
  </g>

  <line x1="10" y1="234" x2="110" y2="234" stroke="#1F2E45" stroke-width="0.5" opacity="0.35"/>

  <!-- E3 - Rígido total -->
  <g id="ehs-3">
    <rect x="0" y="236" width="120" height="82" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <path d="M48,242 Q36,242 32,252 L28,274 Q28,290 26,296 Q24,302 26,306 Q28,312 32,314 L48,314 Q52,314 56,312" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.4"/>
    <!-- Pênis ereto ~80° -->
    <line x1="30" y1="272" x2="26" y2="244" stroke="#4ADE80" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <ellipse cx="24" cy="240" rx="8" ry="6" fill="none" stroke="#4ADE80" stroke-width="3.5" opacity="0.85" transform="rotate(-10,24,240)"/>
    <text x="60" y="264" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4ADE80" opacity="0.5">E3</text>
  </g>
</svg>

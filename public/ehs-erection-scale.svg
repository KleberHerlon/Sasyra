<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 340" width="130" height="340">
  <!-- Painel 1: E0 -->
  <g id="ehs-0">
    <rect x="0" y="2" width="130" height="78" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <!-- Corpo lateral: silhueta masculina -->
    <!-- Abdômen -->
    <path d="M70,8 Q56,10 48,24 L44,40" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <!-- Nádega -->
    <path d="M44,40 Q52,58 48,74" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <!-- Coxa -->
    <line x1="48" y1="74" x2="58" y2="80" stroke="#8899AA" stroke-width="1.2" opacity="0.3"/>
    <!-- Frente do abdômen -->
    <path d="M70,8 Q62,10 56,26 L54,38" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    
    <!-- Pênis E0: pendente para baixo -->
    <line x1="54" y1="38" x2="52" y2="68" stroke="#8899AA" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- glande -->
    <ellipse cx="52" cy="70" rx="6" ry="4.5" fill="none" stroke="#8899AA" stroke-width="2.8" opacity="0.5"/>
    
    <text x="100" y="36" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8899AA" opacity="0.5" font-weight="700">E0</text>
  </g>

  <line x1="10" y1="82" x2="120" y2="82" stroke="#1F2E45" stroke-width="0.5" opacity="0.35"/>

  <!-- Painel 2: E1 -->
  <g id="ehs-1">
    <rect x="0" y="84" width="130" height="78" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <path d="M70,90 Q56,92 48,106 L44,122" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <path d="M44,122 Q52,140 48,156" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <line x1="48" y1="156" x2="58" y2="162" stroke="#8899AA" stroke-width="1.2" opacity="0.3"/>
    <path d="M70,90 Q62,92 56,108 L54,120" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    
    <!-- Pênis E1: ~30° da vertical -->
    <line x1="54" y1="120" x2="38" y2="148" stroke="#FBBF24" stroke-width="4.5" stroke-linecap="round" opacity="0.65"/>
    <ellipse cx="35" cy="151" rx="6.5" ry="5" fill="none" stroke="#FBBF24" stroke-width="3" opacity="0.65"/>
    
    <text x="100" y="118" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FBBF24" opacity="0.55" font-weight="700">E1</text>
  </g>

  <line x1="10" y1="164" x2="120" y2="164" stroke="#1F2E45" stroke-width="0.5" opacity="0.35"/>

  <!-- Painel 3: E2 -->
  <g id="ehs-2">
    <rect x="0" y="166" width="130" height="80" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <path d="M70,172 Q56,174 48,188 L44,206" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <path d="M44,206 Q52,224 48,242" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <line x1="48" y1="242" x2="58" y2="246" stroke="#8899AA" stroke-width="1.2" opacity="0.3"/>
    <path d="M70,172 Q62,174 56,190 L54,202" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    
    <!-- Pênis E2: ~60° da vertical, quase horizontal -->
    <line x1="54" y1="202" x2="20" y2="220" stroke="#FBBF24" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <ellipse cx="16" cy="222" rx="7.5" ry="5.5" fill="none" stroke="#FBBF24" stroke-width="3.2" opacity="0.75" transform="rotate(-25,16,222)"/>
    
    <text x="100" y="200" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FBBF24" opacity="0.6" font-weight="700">E2</text>
  </g>

  <line x1="10" y1="248" x2="120" y2="248" stroke="#1F2E45" stroke-width="0.5" opacity="0.35"/>

  <!-- Painel 4: E3 -->
  <g id="ehs-3">
    <rect x="0" y="250" width="130" height="88" fill="transparent" stroke="transparent" stroke-width="2" rx="4"/>
    <path d="M70,256 Q56,258 48,272 L44,290" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <path d="M44,290 Q52,308 48,328" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    <line x1="48" y1="328" x2="58" y2="338" stroke="#8899AA" stroke-width="1.2" opacity="0.3"/>
    <path d="M70,256 Q62,258 56,274 L54,286" fill="none" stroke="#8899AA" stroke-width="1.2" opacity="0.35"/>
    
    <!-- Pênis E3: ~80°, ereto apontando para cima -->
    <line x1="54" y1="286" x2="42" y2="258" stroke="#4ADE80" stroke-width="5.5" stroke-linecap="round" opacity="0.88"/>
    <ellipse cx="40" cy="254" rx="8" ry="6" fill="none" stroke="#4ADE80" stroke-width="3.5" opacity="0.88"/>
    
    <text x="100" y="284" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4ADE80" opacity="0.65" font-weight="700">E3</text>
  </g>
</svg>
